<style>

  body {

  .canvas {

  /* ── PANEL 1: Scoring Zone (widest — the #1 pick) ── */

  }
  .panel-1::before {
    content: '';

  .panel-1::after {

    clip-path: polygon(24% 0, 92% 0, 76% 100%, 8% 100%);

    background: radial-gradient(ellipse 70% 60% at 60% 50%, rgba(42,110,63,0.12) 0%, transparent 60%);

  /* ── SLASH LINES between panels ── */
  .slash {
    position: absolute;
    top: 0;
    width: 4px;
    height: 140%;
    transform: rotate(8deg);
    transform-origin: center 40%;
    z-index: 15;

  .slash-1 {

    box-shadow: 0 0 16px rgba(34,197,94,0.3), 0 0 40px rgba(34,197,94,0.1);
  }
  .slash-2 {
    left: 42.5%;

  .slash-3 {

    box-shadow: 0 0 16px rgba(232,120,48,0.2);
  }
  .slash-4 {

    box-shadow: 0 0 16px rgba(42,110,63,0.2);
  }

  /* Thin companion lines */
  .slash::before,
  .slash::after {
    content: '';
    position: absolute;
    top: 0;
    width: 1px;
    height: 100%;
    background: rgba(255,255,255,0.08);
  }
  .slash::before { left: -6px; }
  .slash::after { right: -6px; }

  /* ── NOISE OVERLAY ── */
  .noise {
    position: absolute;
    inset: 0;
    z-index: 12;
    opacity: 0.035;

    color: #c8f5f8;

  .brand--core .brand-tag {

  }
  .brand--break .brand-logo img {

    padding: 12px;
  }
  .brand--break .brand-name {
    font-size: 22px;
    color: #fcd4b8;
  }
  .brand--break .brand-tag {
    font-size: 11px;
    color: rgba(232,120,48,0.5);
  }

  /* 4. Drills.golf */
  .brand--drills {

  .brand--drills .brand-logo {
    background: #fff;
  }
  .brand--drills .brand-logo img {
    object-fit: contain;
    padding: 8px;
  }
  .brand--drills .brand-name {
    font-size: 22px;
    color: rgba(255,255,255,0.8);
  }
  .brand--drills .brand-tag {
    font-size: 11px;

  .brand--pp .brand-name {

  .brand--pp .brand-tag {

  /* ── TOP BAR ── */
  .top-bar {

  /* ── BOTTOM BAR ── */

  .corner {

  .corner--tr { top: 18px; right: 18px; border-top: 2px solid rgba(42,110,63,0.3); border-right: 2px solid rgba(42,110,63,0.3); }
  .corner--bl { bottom: 18px; left: 18px; border-bottom: 2px solid rgba(34,197,94,0.25); border-left: 2px solid rgba(34,197,94,0.25); }
