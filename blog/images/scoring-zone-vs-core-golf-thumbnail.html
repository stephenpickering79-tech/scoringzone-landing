<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoring Zone vs CORE Golf — Thumbnail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #060b08;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 90% 70% at 50% 50%, #0d2818 0%, #060b08 70%),
      linear-gradient(180deg, #060b08 0%, #0a1a0f 50%, #060b08 100%);
  }

  .canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      linear-gradient(rgba(34,197,94,0.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,197,94,0.4) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 1;
  }

  .canvas::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(34,197,94,0.10) 0%, transparent 65%);
    z-index: 1;
    pointer-events: none;
  }

  /* HEADER */
  .header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 36px 50px 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(34,197,94,0.85);
    background: rgba(34,197,94,0.08);
    padding: 7px 18px;
    border-radius: 100px;
    border: 1px solid rgba(34,197,94,0.25);
  }

  .sz-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: #f0fdf4;
    text-transform: uppercase;
  }

  .sz-badge img {
    width: 36px;
    height: 36px;
    border-radius: 8px;
  }

  .sz-badge span {
    color: #22c55e;
  }

  /* HEADLINE */
  .headline {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    width: 100%;
  }

  .headline h1 {
    font-weight: 900;
    font-size: 50px;
    color: #fff;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  .headline h1 em {
    font-style: normal;
    color: rgba(255,255,255,0.4);
    font-size: 38px;
    margin: 0 6px;
  }

  .headline-sub {
    margin-top: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }

  /* TILES (2-way) */
  .tiles {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: stretch;
    gap: 36px;
  }

  .vs-pill {
    align-self: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 30px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.1em;
    width: 56px;
    text-align: center;
    text-shadow: 0 0 20px rgba(34,197,94,0.25);
  }

  .tile {
    width: 360px;
    height: 320px;
    border-radius: 24px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 28px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    box-shadow:
      0 12px 36px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .tile::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--brand);
  }

  .tile::after {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, var(--brand-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .tile--comp { --brand: #00d4ff; --brand-glow: rgba(0,212,255,0.22); }
  .tile--sz   { --brand: #22c55e; --brand-glow: rgba(34,197,94,0.22); }

  .tile-logo {
    width: 100px;
    height: 100px;
    border-radius: 20px;
    overflow: hidden;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 6px 18px rgba(0,0,0,0.4),
      0 0 0 2px rgba(255,255,255,0.1);
  }

  .tile-logo--dark { background: #0a1410; }
  .tile-logo--sz {
    background: #000;
    box-shadow:
      0 6px 18px rgba(0,0,0,0.4),
      0 0 0 2px rgba(34,197,94,0.3),
      0 0 30px rgba(34,197,94,0.18);
  }

  .tile-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .tile-logo--contain img {
    object-fit: contain;
    padding: 12px;
  }

  .text-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: #fff;
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.05;
    text-transform: uppercase;
  }

  .tile-name {
    font-weight: 800;
    font-size: 28px;
    color: #fff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1;
    text-align: center;
  }

  .tile-name span {
    color: #22c55e;
  }

  .tile-tag {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.5;
    margin-top: -6px;
  }

  .tile-pill {
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--brand);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.04);
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    line-height: 1.4;
  }

  /* FOOTER */
  .footer-bar {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  /* CORNER ACCENTS */
  .corner {
    position: absolute;
    width: 26px;
    height: 26px;
    z-index: 12;
  }
  .corner--tl { top: 22px; left: 22px; border-top: 2px solid rgba(255,255,255,0.18); border-left: 2px solid rgba(255,255,255,0.18); }
  .corner--tr { top: 22px; right: 22px; border-top: 2px solid rgba(34,197,94,0.4); border-right: 2px solid rgba(34,197,94,0.4); }
  .corner--bl { bottom: 22px; left: 22px; border-bottom: 2px solid rgba(255,255,255,0.18); border-left: 2px solid rgba(255,255,255,0.18); }
  .corner--br { bottom: 22px; right: 22px; border-bottom: 2px solid rgba(34,197,94,0.4); border-right: 2px solid rgba(34,197,94,0.4); }
</style>
</head>
<body>

<div class="canvas">

  <div class="header">
    <div class="top-label">App Comparison &bull; 2026</div>
    <div class="sz-badge">
      <img src="../../logo/new-scoring-zone-logo.png" alt="Scoring Zone logo">
      Scoring <span>Zone</span>
    </div>
  </div>

  <div class="headline">
    <h1>Scoring Zone <em>vs</em> CORE Golf</h1>
    <div class="headline-sub">Cross-platform practice vs iOS-only drills</div>
  </div>

  <div class="tiles">

    <div class="tile tile--comp">
      <div class="tile-logo tile-logo--dark tile-logo--contain">
        <img src="../../18 birdies brand/core golf logo.png" alt="CORE Golf logo">
      </div>
      <div class="tile-name">CORE Golf</div>
      <div class="tile-tag">Drills &bull; iOS Only</div>
      <div class="tile-pill">Best for iOS users</div>
    </div>

    <div class="vs-pill">VS</div>

    <div class="tile tile--sz">
      <div class="tile-logo tile-logo--sz">
        <img src="../../logo/new-scoring-zone-logo.png" alt="Scoring Zone logo">
      </div>
      <div class="tile-name">Scoring <span>Zone</span></div>
      <div class="tile-tag">Short Game &bull; Practice</div>
      <div class="tile-pill">Best for improvement</div>
    </div>

  </div>

  <div class="footer-bar">Which one should you pick?</div>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

</div>

</body>
</html>
