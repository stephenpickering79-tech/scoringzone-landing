<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18Birdies vs Golfshot vs TheGrint — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #060b08; font-family: 'Barlow Condensed', sans-serif; }
  .canvas { position: relative; width: 1200px; height: 630px; overflow: hidden; }

  /* ── PANEL 1: 18 Birdies (left) ── */
  .panel-1 {
    position: absolute; top: 0; left: 0; width: 42%; height: 100%;
    background: #1a6ae0;
    clip-path: polygon(0 0, 90% 0, 76% 100%, 0 100%);
    z-index: 1;
  }
  .panel-1::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 30% 30%, rgba(255,255,255,0.14) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 70% 80%, rgba(0,0,0,0.30) 0%, transparent 50%);
  }
  .panel-1::after {
    content: ''; position: absolute; inset: 0; opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.6'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── PANEL 2: Golfshot (middle) ── */
  .panel-2 {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #c0312a;
    clip-path: polygon(35% 0, 73% 0, 59% 100%, 21% 100%);
    z-index: 2;
  }
  .panel-2::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(255,255,255,0.14) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 50% 80%, rgba(0,0,0,0.30) 0%, transparent 50%);
  }
  .panel-2::after {
    content: ''; position: absolute; inset: 0; opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.6'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── PANEL 3: TheGrint (right, dark + green accent) ── */
  .panel-3 {
    position: absolute; top: 0; right: 0; width: 42%; height: 100%;
    background: #0a2540;
    clip-path: polygon(24% 0, 100% 0, 100% 100%, 10% 100%);
    z-index: 3;
  }
  .panel-3::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 70% 40%, rgba(74, 222, 128, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 70% at 80% 90%, rgba(255,255,255,0.05) 0%, transparent 50%);
  }
  .panel-3::after {
    content: ''; position: absolute; inset: 0; opacity: 0.05;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* ── DIAGONAL SLASHES ── */
  .slash {
    position: absolute; top: 0; width: 6px; height: 140%;
    background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(34,197,94,0.6) 50%, rgba(255,255,255,0.9) 100%);
    transform-origin: center 40%;
    z-index: 10;
    box-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 60px rgba(34,197,94,0.2);
  }
  .slash::before, .slash::after { content: ''; position: absolute; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.15); }
  .slash::before { left: -8px; } .slash::after { right: -8px; }
  .slash-1 { left: 41%; transform: translateX(-50%) rotate(10deg); }
  .slash-2 { left: 65%; transform: translateX(-50%) rotate(10deg); }

  /* ── VS BADGES (smaller for 3-way) ── */
  .vs-badge {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    z-index: 20; width: 76px; height: 76px;
    display: flex; align-items: center; justify-content: center;
  }
  .vs-badge::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle, #0a0a0a 40%, transparent 70%);
    border-radius: 50%; transform: scale(1.7);
  }
  .vs-ring {
    position: absolute; inset: 0; border: 2.5px solid rgba(255,255,255,0.85);
    border-radius: 50%;
    box-shadow: 0 0 22px rgba(34,197,94,0.4), inset 0 0 14px rgba(34,197,94,0.15);
  }
  .vs-text {
    position: relative; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 32px; letter-spacing: 0.04em;
    color: #fff; text-shadow: 0 0 22px rgba(34,197,94,0.5);
  }
  .vs-1 { left: 41%; }
  .vs-2 { left: 65%; }

  /* ── BRAND BLOCKS ── */
  .brand {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 5;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .brand-1 { left: 6%; }
  .brand-2 { left: 53%; transform: translate(-50%, -50%); }
  .brand-3 { right: 6%; }

  .brand-logo {
    width: 110px; height: 110px; border-radius: 24px;
    overflow: hidden; background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 2px rgba(255,255,255,0.18);
  }
  /* Wider tile for horizontal logo lockups (e.g. Golfshot wordmark) */
  .brand-logo--wide { width: 180px; height: 110px; border-radius: 22px; }
  .brand-logo--contain img { object-fit: contain; padding: 14px 18px; }
  .brand-logo--dark { background: #0a2540; }
  .brand-logo img { width: 100%; height: 100%; object-fit: cover; }

  .brand-name {
    font-weight: 800; font-size: 28px; color: #fff;
    letter-spacing: 0.05em; text-transform: uppercase;
    text-shadow: 0 2px 12px rgba(0,0,0,0.45);
    text-align: center; line-height: 1; white-space: nowrap;
  }

  .brand-tag {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: rgba(255,255,255,0.78); letter-spacing: 0.14em;
    text-transform: uppercase; margin-top: -4px;
    text-align: center; white-space: nowrap;
  }

  /* ── TOP / BOTTOM ── */
  .top-bar {
    position: absolute; top: 28px; left: 50%;
    transform: translateX(-50%); z-index: 15;
    font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.55); padding: 6px 24px;
    border-radius: 100px; border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
  }

  .bottom-bar {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%); z-index: 15;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 18px; letter-spacing: 0.1em;
    text-transform: uppercase; color: rgba(255,255,255,0.55);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* ── CORNERS ── */
  .corner { position: absolute; width: 30px; height: 30px; z-index: 15; }
  .corner--tl { top: 20px; left: 20px; border-top: 2px solid rgba(255,255,255,0.18); border-left: 2px solid rgba(255,255,255,0.18); }
  .corner--tr { top: 20px; right: 20px; border-top: 2px solid rgba(34,197,94,0.4); border-right: 2px solid rgba(34,197,94,0.4); }
  .corner--bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(255,255,255,0.18); border-left: 2px solid rgba(255,255,255,0.18); }
  .corner--br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(34,197,94,0.4); border-right: 2px solid rgba(34,197,94,0.4); }
</style>
</head>
<body>

<div class="canvas">
  <!-- Panels -->
  <div class="panel-1"></div>
  <div class="panel-2"></div>
  <div class="panel-3"></div>

  <!-- Slashes -->
  <div class="slash slash-1"></div>
  <div class="slash slash-2"></div>

  <!-- VS badges -->
  <div class="vs-badge vs-1">
    <div class="vs-ring"></div>
    <span class="vs-text">VS</span>
  </div>
  <div class="vs-badge vs-2">
    <div class="vs-ring"></div>
    <span class="vs-text">VS</span>
  </div>

  <!-- Top label -->
  <div class="top-bar">Three-Way Comparison &bull; 2026</div>

  <!-- 18 Birdies -->
  <div class="brand brand-1">
    <div class="brand-logo">
      <img src="../../18 birdies brand/18 bridies logo .jpg" alt="18 Birdies logo">
    </div>
    <div class="brand-name">18 Birdies</div>
    <div class="brand-tag">GPS &bull; Social</div>
  </div>

  <!-- Golfshot -->
  <div class="brand brand-2">
    <div class="brand-logo brand-logo--wide brand-logo--contain">
      <img src="../../18 birdies brand/golfshot-logo.png" alt="Golfshot logo">
    </div>
    <div class="brand-name">Golfshot</div>
    <div class="brand-tag">GPS &bull; Minimal</div>
  </div>

  <!-- TheGrint -->
  <div class="brand brand-3">
    <div class="brand-logo brand-logo--dark">
      <img src="../../18 birdies brand/thegrint-logo.png" alt="TheGrint logo">
    </div>
    <div class="brand-name">TheGrint</div>
    <div class="brand-tag">USGA Handicap</div>
  </div>

  <!-- Bottom -->
  <div class="bottom-bar">Which app do you need?</div>

  <!-- Corner accents -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>
</div>

</body>
</html>
