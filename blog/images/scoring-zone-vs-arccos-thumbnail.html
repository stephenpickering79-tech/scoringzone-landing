<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoring Zone vs Arccos — Thumbnail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; background: #060b08; font-family: 'Barlow Condensed', sans-serif; }
  .canvas { position: relative; width: 1200px; height: 630px; overflow: hidden; }

  /* LEFT: Arccos */
  .panel-left {
    position: absolute; top: 0; left: 0; width: 55%; height: 100%;
    background: #1a3a5c;
    clip-path: polygon(0 0, 88% 0, 72% 100%, 0 100%);
    z-index: 1;
  }
  .panel-left::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 30% 30%, rgba(120, 200, 255, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 70% 80%, rgba(0, 0, 0, 0.35) 0%, transparent 50%);
  }
  .panel-left::after {
    content: ''; position: absolute; inset: 0; opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.6'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* RIGHT: Scoring Zone */
  .panel-right {
    position: absolute; top: 0; right: 0; width: 55%; height: 100%;
    background: #060b08;
    clip-path: polygon(28% 0, 100% 0, 100% 100%, 12% 100%);
    z-index: 2;
  }
  .panel-right::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 70% 40%, rgba(34, 197, 94, 0.10) 0%, transparent 60%),
      radial-gradient(ellipse 50% 70% at 80% 90%, rgba(34, 197, 94, 0.06) 0%, transparent 50%);
  }
  .panel-right::after {
    content: ''; position: absolute; inset: 0; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* Slash */
  .slash { position: absolute; top: 0; left: 50%; width: 6px; height: 140%;
    background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(34,197,94,0.6) 50%, rgba(255,255,255,0.9) 100%);
    transform: translateX(-50%) rotate(10deg); transform-origin: center 40%; z-index: 10;
    box-shadow: 0 0 20px rgba(255,255,255,0.3), 0 0 60px rgba(34,197,94,0.2); }
  .slash::before, .slash::after { content: ''; position: absolute; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.15); }
  .slash::before { left: -8px; } .slash::after { right: -8px; }

  /* VS Badge */
  .vs-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; }
  .vs-badge::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle, #0a0a0a 40%, transparent 70%); border-radius: 50%; transform: scale(1.8); }
  .vs-ring { position: absolute; inset: 0; border: 3px solid rgba(255,255,255,0.8); border-radius: 50%; box-shadow: 0 0 30px rgba(34,197,94,0.4), inset 0 0 20px rgba(34,197,94,0.15); }
  .vs-text { position: relative; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 52px; letter-spacing: 0.04em; color: #fff; text-shadow: 0 0 30px rgba(34,197,94,0.5); }

  /* Arccos brand (text-based, no logo file) */
  .brand-left { position: absolute; top: 50%; left: 16%; transform: translateY(-50%); z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .brand-left-logo {
    width: 200px; height: 130px; border-radius: 22px; background: #0d2942;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
  }
  .brand-left-logo .arccos-mark {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 48px;
    color: #fff; letter-spacing: 0.05em; line-height: 1;
  }
  .brand-left-logo .arccos-sub {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em;
    color: rgba(120, 200, 255, 0.7); margin-top: 6px; text-transform: uppercase;
  }
  .brand-left-name { font-weight: 800; font-size: 32px; color: #fff; letter-spacing: 0.06em; text-transform: uppercase; text-shadow: 0 2px 12px rgba(0,0,0,0.4); text-align: center; line-height: 1; }
  .brand-left-tag { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.7); letter-spacing: 0.12em; text-transform: uppercase; margin-top: -8px; }

  /* Scoring Zone brand */
  .brand-right { position: absolute; top: 50%; right: 14%; transform: translateY(-50%); z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .brand-right-logo { width: 130px; height: 130px; border-radius: 28px; overflow: hidden; background: #000; box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 2px rgba(34,197,94,0.3), 0 0 40px rgba(34,197,94,0.15); }
  .brand-right-logo img { width: 100%; height: 100%; object-fit: cover; }
  .brand-right-name { font-weight: 800; font-size: 32px; color: #f0fdf4; letter-spacing: 0.06em; text-transform: uppercase; text-align: center; line-height: 1; }
  .brand-right-name span { color: #22c55e; }
  .brand-right-tag { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(34,197,94,0.7); letter-spacing: 0.12em; text-transform: uppercase; margin-top: -8px; }

  .top-bar { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); z-index: 15; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.5); padding: 6px 24px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px); }
  .bottom-bar { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 15; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); }

  .corner { position: absolute; width: 30px; height: 30px; z-index: 15; }
  .corner--tl { top: 20px; left: 20px; border-top: 2px solid rgba(255,255,255,0.15); border-left: 2px solid rgba(255,255,255,0.15); }
  .corner--tr { top: 20px; right: 20px; border-top: 2px solid rgba(34,197,94,0.3); border-right: 2px solid rgba(34,197,94,0.3); }
  .corner--bl { bottom: 20px; left: 20px; border-bottom: 2px solid rgba(255,255,255,0.15); border-left: 2px solid rgba(255,255,255,0.15); }
  .corner--br { bottom: 20px; right: 20px; border-bottom: 2px solid rgba(34,197,94,0.3); border-right: 2px solid rgba(34,197,94,0.3); }
</style>
</head>
<body>
<div class="canvas">
  <div class="panel-left"></div>
  <div class="panel-right"></div>
  <div class="slash"></div>
  <div class="vs-badge"><div class="vs-ring"></div><span class="vs-text">VS</span></div>
  <div class="top-bar">App Comparison &bull; 2026</div>
  <div class="brand-left">
    <div class="brand-left-logo">
      <span class="arccos-mark">ARCCOS</span>
      <span class="arccos-sub">Caddie</span>
    </div>
    <div class="brand-left-name">Arccos</div>
    <div class="brand-left-tag">Sensor Tracking &bull; Strokes Gained</div>
  </div>
  <div class="brand-right">
    <div class="brand-right-logo"><img src="../../logo/new-scoring-zone-logo.png" alt="Scoring Zone logo"></div>
    <div class="brand-right-name">Scoring <span>Zone</span></div>
    <div class="brand-right-tag">Short Game &bull; Practice</div>
  </div>
  <div class="bottom-bar">Which app do you need?</div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>
</div>
</body>
</html>
